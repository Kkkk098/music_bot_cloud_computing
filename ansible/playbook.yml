---
- name: Deploy music bot
  hosts: server
  become: yes

  vars:
    app_dir: /opt/music-app

  tasks:

    - name: Install packages
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Enable docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory

    - name: Copy docker-compose
      copy:
        src: ../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"

    - name: Create env file
      copy:
        dest: "{{ app_dir }}/.env"
        content: |
          TELEGRAM_TOKEN={{ telegram_token }}

    - name: Run docker compose
      community.docker.docker_compose:
        project_src: "{{ app_dir }}"
        state: present

