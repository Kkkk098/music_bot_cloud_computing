version: "3.9"

services:
  music-api:
    image: kkkk098/music-app:api-latest
    container_name: music-api
    ports:
      - "8000:8000"
    restart: always
    environment:
      WEIGHTS_PATH: /app/best_model_heavy_m192_h256_gru256x2.pth
    volumes:
      - ./best_model_heavy_m192_h256_gru256x2.pth:/app/best_model_heavy_m192_h256_gru256x2.pth
   
  music-bot:
    image: kkkk098/music-app:bot-latest
    container_name: music-bot
    depends_on:
      - music-api
    restart: always
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      API_URL: http://music-api:8000/predict_segmented
