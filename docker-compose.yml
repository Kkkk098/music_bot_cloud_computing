version: "3.9"

services:
  music-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: music-api
    ports:
      - "8000:8000"
    restart: always

  music-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: music-bot
    depends_on:
      - music-api
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      API_URL: http://music-api:8000/predict_segmented
    restart: always
